<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoloNote - 1인 업무노트</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div>
        <p class="eyebrow">1인 업무노트</p>
        <h1>SoloNote</h1>
        <p class="subtitle">혼자 일하는 사람을 위한 업무 · 아이디어 · 할 일 기록장</p>
      </div>
      <div class="header-badge">
        <span id="memoCount">0</span>
        <small>개의 메모</small>
      </div>
    </header>

    <main class="layout">
      <section class="panel editor-panel collapsed" aria-labelledby="editorTitle">
        <div class="section-title-row editor-title-row">
          <div>
            <h2 id="editorTitle">새 메모 작성</h2>
            <p>떠오른 업무, 아이디어, 할 일을 바로 기록하세요.</p>
          </div>
          <div class="editor-actions">
            <button type="button" id="editorToggleButton" class="primary-button compact-button">+ 새 메모 작성</button>
            <button type="button" id="resetButton" class="ghost-button compact-button hidden">수정 취소</button>
          </div>
        </div>

        <form id="memoForm" class="memo-form editor-content">
          <input type="hidden" id="editingId" />

          <label for="titleInput">제목</label>
          <input
            id="titleInput"
            type="text"
            placeholder="예: 업무노트 앱 1차 기능 정리"
            autocomplete="off"
          />

          <label for="contentInput">내용</label>
          <textarea
            id="contentInput"
            rows="8"
            placeholder="메모 내용을 입력하세요."
          ></textarea>

          <label for="categoryInput">카테고리</label>
          <select id="categoryInput">
            <option value="업무">업무</option>
            <option value="아이디어">아이디어</option>
            <option value="할 일">할 일</option>
            <option value="프로젝트">프로젝트</option>
            <option value="보관">보관</option>
          </select>

          <label class="checkbox-row" for="importantInput">
            <input id="importantInput" type="checkbox" />
            <span>중요 메모로 표시</span>
          </label>

          <button type="submit" id="saveButton" class="primary-button">저장하기</button>
        </form>
      </section>

      <section class="panel list-panel" aria-labelledby="listTitle">
        <div class="section-title-row">
          <div>
            <h2 id="listTitle">저장된 메모</h2>
            <p>카테고리와 검색으로 필요한 메모를 찾을 수 있습니다.</p>
          </div>
        </div>

        <div class="backup-actions" aria-label="백업과 복원">
          <button type="button" id="backupButton" class="secondary-button backup-button">백업하기</button>
          <button type="button" id="restoreButton" class="ghost-button backup-button">복원하기</button>
          <input id="restoreInput" type="file" accept=".json,application/json" hidden aria-hidden="true" />
        </div>

        <div class="search-box">
          <input
            id="searchInput"
            type="search"
            placeholder="제목 또는 내용 검색하기..."
          />
        </div>

        <nav id="categoryTabs" class="category-tabs" aria-label="메모 카테고리">
          <button type="button" class="category-tab active" data-category="전체">전체</button>
          <button type="button" class="category-tab" data-category="중요">중요</button>
          <button type="button" class="category-tab" data-category="업무">업무</button>
          <button type="button" class="category-tab" data-category="아이디어">아이디어</button>
          <button type="button" class="category-tab" data-category="할 일">할 일</button>
          <button type="button" class="category-tab" data-category="프로젝트">프로젝트</button>
          <button type="button" class="category-tab" data-category="보관">보관</button>
          <button type="button" class="category-tab" data-category="휴지통">휴지통</button>
        </nav>

        <div id="memoList" class="memo-list"></div>
      </section>
    </main>
  </div>

  <div id="detailModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
    <div class="modal-backdrop" data-close="true"></div>
    <article class="modal-card">
      <button type="button" id="closeDetailButton" class="close-button" aria-label="상세 보기 닫기">×</button>

      <div class="detail-meta">
        <span id="detailCategory" class="category-chip">업무</span>
        <span id="detailDate"></span>
      </div>

      <h2 id="detailTitle"></h2>
      <p id="detailContent"></p>

      <div class="detail-actions">
        <button type="button" id="editMemoButton" class="secondary-button">수정하기</button>
        <button type="button" id="deleteMemoButton" class="danger-button">삭제하기</button>
      </div>
    </article>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
